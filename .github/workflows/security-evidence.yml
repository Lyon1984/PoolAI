name: security-evidence

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
      security-events: write
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: csharp,javascript-typescript
          queries: security-extended

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Restore locked dependencies
        run: |
          dotnet restore PoolAI.sln --locked-mode
          pnpm --dir frontend install --frozen-lockfile

      - name: Build analyzed sources
        run: |
          dotnet build PoolAI.sln --no-restore
          pnpm --dir frontend build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  repository-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Restore locked dependencies for license inventory
        run: |
          dotnet restore PoolAI.sln --locked-mode
          pnpm --dir frontend install --frozen-lockfile

      - name: Audit production frontend dependencies
        run: pnpm --dir frontend audit --prod --audit-level high

      - name: Scan Git history for secrets
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --volume "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git --redact --no-banner --log-level warn /repo

      - name: Prepare security evidence directory
        run: mkdir -p artifacts/security

      - name: Scan source dependencies, licenses, and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,license
          trivy-config: eng/security/trivy.yaml
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1
          format: json
          list-all-pkgs: true
          output: artifacts/security/trivy-source.json
          skip-dirs: .git,.tools,artifacts

      - name: Verify frontend and NuGet license inventory
        run: node eng/security/verify-trivy-license-inventory.mjs artifacts/security/trivy-source.json

      - name: Upload repository security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-security-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/security/
          if-no-files-found: warn
          retention-days: 14

  image-evidence:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CI: true
      COMPOSE_PROJECT_NAME: poolai-image-${{ github.run_id }}-${{ github.run_attempt }}
      DOCKER_CONFIG: /tmp/poolai-docker-config-${{ github.run_id }}-${{ github.run_attempt }}
      DOCKER_HOST: unix:///var/run/docker.sock
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_XMLDOC_MODE: skip
      POOLAI_API_IMAGE: poolai-api:ci-${{ github.sha }}
      POOLAI_CI_BIN: /tmp/poolai-ci-bin-${{ github.run_id }}-${{ github.run_attempt }}
      POOLAI_MIGRATOR_IMAGE: poolai-migrator:ci-${{ github.sha }}
      POOLAI_SECRET_DIR: ${{ github.workspace }}/.tools/compose/secrets
      POOLAI_WORKER_IMAGE: poolai-worker:ci-${{ github.sha }}
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install pinned Docker plugins
        run: |
          node eng/ci/install-linux-docker-plugins.mjs
          tools/local-dev/run-with-toolchain.sh docker buildx version
          tools/local-dev/run-with-toolchain.sh docker compose version

      - name: Install pinned Syft
        run: |
          node eng/ci/install-linux-syft.mjs
          "$POOLAI_CI_BIN/syft" version

      - name: Prepare image evidence directories
        run: mkdir -p artifacts/sbom artifacts/security

      - name: Generate source SBOM before local secret material exists
        run: |
          "$POOLAI_CI_BIN/syft" scan dir:. --output spdx-json="$RUNNER_TEMP/source.spdx.json"
          mv "$RUNNER_TEMP/source.spdx.json" artifacts/sbom/source.spdx.json

      - name: Publish Hosts and build candidate images
        run: |
          eng/build/publish-hosts.sh
          tools/local-dev/prepare-compose.sh
          tools/local-dev/validate-compose.sh
          tools/local-dev/run-with-toolchain.sh docker compose --file deploy/compose/compose.yaml build migrator api worker

      - name: Verify non-root image metadata
        run: eng/security/verify-image-hardening.sh "$POOLAI_API_IMAGE" "$POOLAI_WORKER_IMAGE" "$POOLAI_MIGRATOR_IMAGE"

      - name: Generate API image SBOM
        run: |
          "$POOLAI_CI_BIN/syft" scan "$POOLAI_API_IMAGE" --output spdx-json=artifacts/sbom/api.spdx.json

      - name: Generate Worker image SBOM
        run: |
          "$POOLAI_CI_BIN/syft" scan "$POOLAI_WORKER_IMAGE" --output spdx-json=artifacts/sbom/worker.spdx.json

      - name: Generate Migrator image SBOM
        run: |
          "$POOLAI_CI_BIN/syft" scan "$POOLAI_MIGRATOR_IMAGE" --output spdx-json=artifacts/sbom/migrator.spdx.json

      - name: Scan API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: image
          scan-ref: ${{ env.POOLAI_API_IMAGE }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1
          format: json
          output: artifacts/security/trivy-api.json

      - name: Scan Worker image
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: image
          scan-ref: ${{ env.POOLAI_WORKER_IMAGE }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1
          format: json
          output: artifacts/security/trivy-worker.json

      - name: Scan Migrator image
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: image
          scan-ref: ${{ env.POOLAI_MIGRATOR_IMAGE }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1
          format: json
          output: artifacts/security/trivy-migrator.json

      - name: Upload SBOM and image scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/sbom/
            artifacts/security/
          if-no-files-found: warn
          retention-days: 30
