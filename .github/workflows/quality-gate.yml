name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  issues: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: true
      CONTRACT_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      COVERAGE_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      COVERAGE_REQUIRE_DIFF: ${{ github.event_name == 'pull_request' }}
      DOCKER_CONFIG: /tmp/poolai-docker-config-${{ github.run_id }}-${{ github.run_attempt }}
      DOCKER_HOST: unix:///var/run/docker.sock
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_XMLDOC_MODE: skip
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Verify ADR 0006 GitHub approval evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ADR0006_EVENT_NAME: ${{ github.event_name }}
          ADR0006_BASE_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          ADR0006_CHECKOUT_HEAD: ${{ github.sha }}
          ADR0006_SIGNING_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: node eng/policies/validate-traceability.mjs --github-evidence

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install pinned Docker plugins
        run: |
          node eng/ci/install-linux-docker-plugins.mjs
          tools/local-dev/run-with-toolchain.sh docker buildx version
          tools/local-dev/run-with-toolchain.sh docker compose version

      - name: Run repository quality gate
        run: eng/test/quality-gate.sh

      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/coverage/dotnet/
            frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

  browser-smoke:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Chromium for pull request smoke
        if: github.event_name == 'pull_request'
        run: pnpm --dir frontend exec playwright install --with-deps --no-shell chromium

      - name: Run Chromium smoke
        if: github.event_name == 'pull_request'
        run: pnpm --dir frontend exec playwright test --project=chromium

      - name: Install release browser matrix
        if: github.event_name != 'pull_request'
        run: pnpm --dir frontend exec playwright install --with-deps --no-shell chromium firefox webkit

      - name: Run release browser matrix
        if: github.event_name != 'pull_request'
        run: pnpm --dir frontend exec playwright test

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  dynamic-compose:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: true
      COMPOSE_PROJECT_NAME: poolai-ci-${{ github.run_id }}-${{ github.run_attempt }}
      DOCKER_CONFIG: /tmp/poolai-docker-config-${{ github.run_id }}-${{ github.run_attempt }}
      DOCKER_HOST: unix:///var/run/docker.sock
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      NUGET_XMLDOC_MODE: skip
      POOLAI_SECRET_DIR: ${{ github.workspace }}/.tools/compose/secrets
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install pinned Docker plugins
        run: |
          node eng/ci/install-linux-docker-plugins.mjs
          tools/local-dev/run-with-toolchain.sh docker buildx version
          tools/local-dev/run-with-toolchain.sh docker compose version

      - name: Start and verify the full Compose topology
        run: tools/local-dev/compose-up.sh

      - name: Collect Compose evidence
        if: always()
        continue-on-error: true
        run: |
          mkdir -p artifacts/compose
          tools/local-dev/run-with-toolchain.sh docker compose --file deploy/compose/compose.yaml ps --all > artifacts/compose/ps.txt 2>&1 || true
          tools/local-dev/run-with-toolchain.sh docker compose --file deploy/compose/compose.yaml logs --no-color --timestamps > artifacts/compose/logs.txt 2>&1 || true

      - name: Upload Compose evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dynamic-compose-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/compose/
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down the CI topology
        if: always()
        continue-on-error: true
        run: tools/local-dev/run-with-toolchain.sh docker compose --file deploy/compose/compose.yaml down --volumes --remove-orphans
