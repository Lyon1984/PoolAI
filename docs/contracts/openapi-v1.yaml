      required:
        [id, name, platform, provider, account_type, base_url, credential_prefix, status,
         health, active_leases, max_concurrency, priority, weight, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        platform:
          type: string
          const: openai
          description: R1 OpenAI 兼容协议族；不是上游 provider 选择器
        provider:
          $ref: '#/components/schemas/UpstreamProvider'
        account_type:
          type: string
          const: api_key
        base_url:
          type: string
          format: uri
        credential_prefix:
          type: string
        status:
          $ref: '#/components/schemas/AccountStatus'
        health:
          $ref: '#/components/schemas/AccountHealth'
        active_leases:
          type: integer
          minimum: 0
          maximum: 10000
          readOnly: true
          description: 当前有效并发租约数；调度以 active_leases < max_concurrency 为可用条件之一
        max_concurrency:
          type: integer
          minimum: 1
          maximum: 10000
        priority:
          type: integer
          minimum: -100000
          maximum: 100000
        weight:
          type: integer
          minimum: 1
          maximum: 100000
          description: 同优先级账号的默认加权调度权重，可由 Group binding 覆盖
        version:
          $ref: '#/components/schemas/ResourceVersion'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    AccountCreateRequest:
      type: object
      additionalProperties: false
      required: [name, provider, base_url, credential, max_concurrency]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        provider:
          $ref: '#/components/schemas/UpstreamProvider'
        base_url:
          type: string
          format: uri
        credential:
          type: string
          minLength: 16
          maxLength: 4096
          writeOnly: true
        max_concurrency:
          type: integer
          minimum: 1
          maximum: 10000
        priority:
          type: integer
          minimum: -100000
          maximum: 100000
          default: 0
        weight:
          type: integer
          minimum: 1
          maximum: 100000
          default: 100
    AccountUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      anyOf:
        - required: [name]
        - required: [base_url]
        - required: [credential]
        - required: [status]
        - required: [max_concurrency]
        - required: [priority]
        - required: [weight]
      allOf:
        - if:
            anyOf:
              - required: [credential]
              - required: [status]
          then:
            required: [reason]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        base_url:
          type: string
          format: uri
        credential:
          type: string
          minLength: 16
          maxLength: 4096
          writeOnly: true
        status:
          type: string
          enum: [active, disabled]
          description: retired 只能由 DELETE 进入
        max_concurrency:
          type: integer
          minimum: 1
          maximum: 10000
        priority:
          type: integer
          minimum: -100000
          maximum: 100000
        weight:
          type: integer
          minimum: 1
          maximum: 100000
        reason:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\S.*'
          description: credential 或 status 变化时必填；进入审计事件但不得包含秘密
    AccountPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        page:
          $ref: '#/components/schemas/PageInfo'
    AccountUsagePoint:
      type: object
      additionalProperties: false
      required: [starts_at, requests, attempts, failed_attempts, input_tokens, output_tokens, total_tokens]
      properties:
        starts_at:
          $ref: '#/components/schemas/Timestamp'
        requests:
          $ref: '#/components/schemas/SafeTokenCount'
        attempts:
          $ref: '#/components/schemas/SafeTokenCount'
        failed_attempts:
          $ref: '#/components/schemas/SafeTokenCount'
        input_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        output_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        total_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
    AccountUsageReport:
      type: object
      additionalProperties: false
      required: [account_id, from, to, granularity, data]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        from:
          $ref: '#/components/schemas/Timestamp'
        to:
          $ref: '#/components/schemas/Timestamp'
        granularity:
          type: string
          enum: [hour, day]
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountUsagePoint'
    UsageAggregateRow:
      type: object
      additionalProperties: false
      required:
        [starts_at, account_id, group_id, model, requests, attempts, failed_attempts,
         input_tokens, output_tokens, total_tokens]
      properties:
        starts_at: { $ref: '#/components/schemas/Timestamp' }
        account_id: { $ref: '#/components/schemas/Uuid' }
        group_id: { $ref: '#/components/schemas/Uuid' }
        model: { type: string }
        requests: { $ref: '#/components/schemas/SafeTokenCount' }
        attempts: { $ref: '#/components/schemas/SafeTokenCount' }
        failed_attempts: { $ref: '#/components/schemas/SafeTokenCount' }
        input_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
        output_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
        total_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
    UsageAggregatePage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/UsageAggregateRow' }
        page: { $ref: '#/components/schemas/PageInfo' }
    UsageAttempt:
      type: object
      additionalProperties: false
      required:
        [attempt_id, request_id, attempt_index, account_id, quota_group_id, requested_model,
         upstream_model, status, stream, usage_source, is_estimated, has_adjustment, input_tokens,
         output_tokens, total_tokens, started_at, ended_at]
      allOf:
        - if:
            properties:
              usage_source: { const: confirmed_no_execution }
            required: [usage_source]
          then:
            properties:
              is_estimated: { const: false }
              input_tokens: { const: '0' }
              output_tokens: { const: '0' }
              total_tokens: { const: '0' }
      properties:
        attempt_id: { $ref: '#/components/schemas/Uuid' }
        request_id: { $ref: '#/components/schemas/Uuid' }
        attempt_index: { type: integer, minimum: 0 }
        account_id: { $ref: '#/components/schemas/Uuid' }
        quota_group_id: { $ref: '#/components/schemas/Uuid' }
        requested_model: { type: string }
        upstream_model: { type: string }
        status: { type: string, enum: [succeeded, failed, cancelled] }
        stream: { type: boolean }
        usage_source:
          type: string
          enum: [upstream, local_tokenizer, conservative_estimate, confirmed_no_execution]
          description: confirmed_no_execution 只用于 dispatch fence 已提交但有可审计未发送/未执行证据的 0 Token settled attempt；不表示 reservation released
        is_estimated: { type: boolean }
        has_adjustment: { type: boolean }
        input_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
        output_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
        total_tokens: { $ref: '#/components/schemas/AggregateTokenCount' }
        http_status: { type: [integer, 'null'], minimum: 100, maximum: 599 }
        error_code: { type: [string, 'null'] }
        started_at: { $ref: '#/components/schemas/Timestamp' }
        ended_at: { $ref: '#/components/schemas/Timestamp' }
    UsageAttemptPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/UsageAttempt' }
        page: { $ref: '#/components/schemas/PageInfo' }

    ModelMapping:
      type: object
      additionalProperties: false
      required: [client_model, upstream_model]
      properties:
        client_model:
          type: string
          minLength: 1
          maxLength: 200
        upstream_model:
          type: string
          minLength: 1
          maxLength: 200
    ChannelCapabilities:
      type: object
      additionalProperties: false
      required: [responses, chat_completions, function_tools, streaming]
      properties:
        responses:
          type: boolean
          description: 支持 /v1/responses
        chat_completions:
          type: boolean
          description: 支持 /v1/chat/completions
        function_tools:
          type: boolean
          description: 支持本冻结契约中的函数工具调用闭环
        streaming:
          type: boolean
          description: 支持 SSE 流式响应
    Channel:
      type: object
      additionalProperties: false
      required: [id, name, platform, provider, status, capabilities, model_mappings, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        platform:
          type: string
          const: openai
          description: R1 OpenAI 兼容协议族；不是上游 provider 选择器
        provider:
          $ref: '#/components/schemas/UpstreamProvider'
        status:
          type: string
          enum: [active, disabled, retired]
        capabilities:
          $ref: '#/components/schemas/ChannelCapabilities'
        model_mappings:
          type: array
          items:
            $ref: '#/components/schemas/ModelMapping'
        version:
          $ref: '#/components/schemas/ResourceVersion'
        created_at:
          $ref: '#/components/schemas/Timestamp'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    ChannelCreateRequest:
      type: object
      additionalProperties: false
      required: [name, provider, capabilities, model_mappings]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        provider:
          $ref: '#/components/schemas/UpstreamProvider'
        capabilities:
          $ref: '#/components/schemas/ChannelCapabilities'
        model_mappings:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ModelMapping'
    ChannelUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      anyOf:
        - required: [name]
        - required: [status]
        - required: [capabilities]
        - required: [model_mappings]
      allOf:
        - if:
            required: [status]
          then:
            required: [reason]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        status:
          type: string
          enum: [active, disabled]
          description: retired 只能由 DELETE 进入
        capabilities:
          $ref: '#/components/schemas/ChannelCapabilities'
        model_mappings:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ModelMapping'
        reason:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '.*\S.*'
          description: status 变化时必填
    ChannelPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
        page:
          $ref: '#/components/schemas/PageInfo'

    UsageBreakdown:
      type: object
      additionalProperties: false
      required:
        [requests, attempts, failed_attempts, failovers, estimated_attempts,
         estimated_tokens, input_tokens, output_tokens, cache_creation_tokens,
         cache_read_tokens, thinking_tokens, total_tokens]
      properties:
        requests:
          $ref: '#/components/schemas/SafeTokenCount'
        attempts:
          $ref: '#/components/schemas/SafeTokenCount'
        failed_attempts:
          $ref: '#/components/schemas/SafeTokenCount'
        failovers:
          $ref: '#/components/schemas/SafeTokenCount'
        estimated_attempts:
          $ref: '#/components/schemas/SafeTokenCount'
        estimated_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        input_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        output_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        cache_creation_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        cache_read_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        thinking_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        total_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
    GroupPoolSummary:
      type: object
      additionalProperties: false
      required:
        [group_id, group_name, subscription_id, plan_name, access_expires_at, quota_status,
         total_tokens, consumed_tokens, reserved_tokens, remaining_tokens, updated_at]
      properties:
        group_id:
          $ref: '#/components/schemas/Uuid'
        group_name:
          type: string
        subscription_id:
          $ref: '#/components/schemas/Uuid'
        plan_name:
          type: string
        access_expires_at:
          $ref: '#/components/schemas/Timestamp'
        quota_status:
          type: string
          enum: [active, exhausted, disabled]
        total_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        consumed_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        reserved_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        remaining_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        updated_at:
          $ref: '#/components/schemas/Timestamp'
    AuditActorType:
      type: string
      enum: [user, admin, operator, system, service]
    AuditEvent:
      type: object
      additionalProperties: false
      required:
        [id, actor_type, actor_id, action, resource_type, resource_id, request_id,
         source, source_ip, user_agent_summary, occurred_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        actor_type:
          $ref: '#/components/schemas/AuditActorType'
        actor_id:
          description: system/service 未绑定用户时为 null
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        request_id:
          description: 非 HTTP 后台任务产生的事件可为 null
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        source:
          type: string
          enum: [web, api, gateway, scheduler, worker, system]
        source_ip:
          type: [string, 'null']
          maxLength: 64
          description: 规范化 IP；无网络来源时为 null
        user_agent_summary:
          type: [string, 'null']
          maxLength: 500
          description: 截断并清洗后的客户端摘要；不得保存认证信息
        idempotency_key_hash:
          type: [string, 'null']
          description: 仅保存不可逆摘要，用于审计关联
        reason:
          type: [string, 'null']
          pattern: '.*\S.*'
        changes:
          type: object
          additionalProperties: true
          description: 已脱敏的前后差异；永不含密码、Token 或 credential
        occurred_at:
          $ref: '#/components/schemas/Timestamp'
    RuntimeSettingsSummary:
      type: object
      additionalProperties: false
      required:
        [environment, public_base_url, database_configured, redis_configured,
         api_key_pepper_configured, credential_key_configured, reservation]
      properties:
        environment: { type: string }
        public_base_url: { type: string, format: uri }
        database_configured: { type: boolean, const: true }
        redis_configured: { type: boolean }
        api_key_pepper_configured: { type: boolean }
        credential_key_configured: { type: boolean }
        reservation:
          type: object
          additionalProperties: false
          required: [lease_seconds, renew_interval_seconds, max_request_seconds]
          properties:
            lease_seconds: { type: integer, const: 300 }
            renew_interval_seconds: { type: integer, const: 60 }
            max_request_seconds: { type: integer, const: 600 }
    AuditEventPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        page:
          $ref: '#/components/schemas/PageInfo'
    PoolUsage:
      type: object
      additionalProperties: false
      required:
        [object, mode, isValid, can_request, unlimited, remaining, unit, planName,
         scope, group, access, quota, usage, timezone, updated_at, usage_updated_at,
         data_lag_seconds]
      properties:
        object:
          type: string
          const: pool_usage
        mode:
          type: string
          const: subscription_group_quota
        isValid:
          type: boolean
          description: 兼容字段；有效订阅下恒为 true，否则接口已返回 403
        can_request:
          type: boolean
          description: 当前存在可分配量，但不保证任意大小请求都能预留成功
        unlimited:
          type: boolean
          const: false
        remaining:
          $ref: '#/components/schemas/AggregateTokenCount'
        unit:
          type: string
          const: tokens
        planName:
          type: string
        scope:
          type: string
          const: group_pool
        group:
          type: object
          additionalProperties: false
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        access:
          type: object
          additionalProperties: false
          required: [source, status, starts_at, expires_at]
          properties:
            source:
              type: string
              const: subscription
            status:
              type: string
              const: active
            starts_at:
              $ref: '#/components/schemas/Timestamp'
            expires_at:
              $ref: '#/components/schemas/Timestamp'
        quota:
          type: object
          additionalProperties: false
          required:
            [status, total_tokens, consumed_tokens, reserved_tokens, remaining_tokens,
             overage_tokens, utilization_percent, consumed_percent, reserved_percent,
             occupied_percent, remaining_percent, period_started_at, reset_at, updated_at]
          properties:
            status:
              type: string
              enum: [active, exhausted, disabled]
            total_tokens:
              $ref: '#/components/schemas/AggregateTokenCount'
            consumed_tokens:
              $ref: '#/components/schemas/AggregateTokenCount'
            reserved_tokens:
              $ref: '#/components/schemas/AggregateTokenCount'
            remaining_tokens:
              $ref: '#/components/schemas/AggregateTokenCount'
            overage_tokens:
              $ref: '#/components/schemas/AggregateTokenCount'
            utilization_percent:
              type: number
              format: double
              minimum: 0
            consumed_percent:
              type: number
              format: double
              minimum: 0
            reserved_percent:
              type: number
              format: double
              minimum: 0
            occupied_percent:
              type: number
              format: double
              minimum: 0
            remaining_percent:
              type: number
              format: double
              minimum: 0
              maximum: 100
            period_started_at:
              $ref: '#/components/schemas/Timestamp'
            reset_at:
              type: 'null'
              description: Release 1 仅手动重置，固定为 null
            updated_at:
              $ref: '#/components/schemas/Timestamp'
        usage:
          type: object
          additionalProperties: false
          required: [today, last_7d, last_30d, quota_period]
          properties:
            today:
              $ref: '#/components/schemas/UsageBreakdown'
            last_7d:
              $ref: '#/components/schemas/UsageBreakdown'
            last_30d:
              $ref: '#/components/schemas/UsageBreakdown'
            quota_period:
              $ref: '#/components/schemas/UsageBreakdown'
        timezone:
          type: string
          description: IANA timezone，例如 Asia/Shanghai
        updated_at:
          $ref: '#/components/schemas/Timestamp'
        usage_updated_at:
          $ref: '#/components/schemas/Timestamp'
        data_lag_seconds:
          type: integer
          minimum: 0
