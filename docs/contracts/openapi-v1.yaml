                retry_after_seconds: 1
    GatewayTooManyRequests:
      description: 模型执行路径的 Group 配额、速率限制或 NonStream/SSE 进程级 bulkhead 拒绝
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
