openapi: 3.1.0
info:
  title: PoolAI Release 1 API
  version: 1.0.0
  summary: PoolAI 非盈利版 Release 1 的可执行 HTTP 契约
  description: |
    本文件冻结 Release 1 的公开数据面和最小控制面。数据面只承诺
    OpenAI/Codex 的文本与函数工具垂直切片，不宣称覆盖完整 OpenAI API。

    管理输入与单请求 OpenAI usage 使用 JSON number，范围为 `0..9007199254740991`。
    Group quota、时间窗口和 Account/Group 聚合可能因长期累加或超额核销超过该范围，
    因此一律使用规范十进制 string；服务端使用 .NET `BigInteger` / PostgreSQL `NUMERIC`。

    `/v1/responses` 的流遵循 OpenAI typed SSE：`event` 与 `data.type` 相同，
    `sequence_number` 从 0 开始严格递增，正常流以 `response.completed` 结束且不发送
    Chat Completions 风格的 `[DONE]`。流已开始后的错误发送 `event: error` 后关闭连接，
    不再发送 `response.completed`。参考：
    https://developers.openai.com/api/docs/guides/streaming-responses 与
    https://developers.openai.com/api/reference/resources/responses/streaming-events 。

    控制面资源变更必须携带 `Idempotency-Key`。认证会话端点由一次性 Refresh Token
    轮换保证重放安全，因此不要求该 Header。所有 versioned resource 的状态变更、
    PATCH、软退役和 Group 配额调整/重置还必须携带 `If-Match`。`/v1/*` 错误只使用
    `application/json` GatewayProblem；`/api/v1/*` 错误只使用
    `application/problem+json` Problem Details。两个 Schema 在机器契约中彻底隔离：
    控制面 ControlPlaneProblem 不允许 OpenAI `error` 投影，数据面 GatewayProblem
    必须携带该投影。统一错误目录与 phase-aware retry/failover 矩阵见
    `error-catalog.md`。
  license:
    name: Internal specification
servers:
  - url: https://poolai.example.com
    description: 生产环境示例；部署时替换
tags:
  - name: Gateway
    description: 使用 `sk-` API Key 的模型数据面
  - name: Usage
    description: 当前 Key 所属 Group 的共享池总体用量
  - name: Auth
    description: 封闭注册下的用户会话
  - name: Me
    description: 当前用户的安全状态、API Key、订阅与脱敏安全事件
  - name: AdminUsers
    description: 管理员用户控制面
  - name: AdminGroups
    description: Group 与共享 Token 池控制面
  - name: AdminSupply
    description: Group 的独立 Supply 配置、Channel 与 Account 绑定控制面
  - name: AdminSubscriptions
    description: canonical Subscription 控制面
  - name: AdminTemplates
    description: 无价格 Subscription Template 控制面
  - name: AdminAccounts
    description: OpenAI API-key 上游账号控制面
  - name: AdminChannels
    description: 模型目录、映射与账号集合控制面

paths:
  /v1/responses:
    post:
      tags: [Gateway]
      operationId: createResponse
      summary: 创建 Responses 请求
      description: |
        Release 1 冻结文本输入、文本输出、函数工具、`previous_response_id`、流式与
        非流式行为。其他 OpenAI 字段即使被 schema 宽容接收，也不构成支持承诺；
        不支持的字段返回 `unsupported_feature`。

        `stream=true` 时返回 `text/event-stream`。文本完成、函数调用与流开始后错误的
        golden fixture 分别位于 `fixtures/responses-stream-completed.sse`、
        `fixtures/responses-stream-function-call.sse` 和 `fixtures/responses-stream-error.sse`；
        Header 已提交但尚无业务事件即发生首包超时的单帧终止流见
        `fixtures/responses-stream-first-byte-timeout.sse`；
        上游 usage 超出安全整数边界的终止流见
        `fixtures/responses-stream-usage-out-of-range.sse`，非流 502 见
        `fixtures/gateway-upstream-usage-out-of-range.json`；
        函数执行结果回传请求见 `fixtures/responses-function-tool-followup.json`。
      security:
        - PoolApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponseCreateRequest'
      responses:
        '200':
          description: 非流式结果，或已经成功建立的 SSE 流
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              schema:
                type: string
              description: SSE 固定为 `no-cache, no-transform`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIResponse'
            text/event-stream:
              schema:
                type: string
                contentMediaType: text/event-stream
                description: 每个 `data` JSON 必须匹配 `ResponseStreamEvent`；SSE wire framing 由 golden fixtures 冻结。
              examples:
                completed:
                  summary: typed events 正常完成；完整内容见 golden fixture
                  value: |-
                    event: response.created
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_01JZ8A","object":"response","created_at":1783987200,"status":"in_progress","error":null,"incomplete_details":null,"instructions":null,"metadata":{},"model":"gpt-5","output":[],"parallel_tool_calls":true,"temperature":1,"tool_choice":"auto","tools":[],"top_p":1,"usage":null}}

                    event: response.in_progress
                    data: {"type":"response.in_progress","sequence_number":1,"response":{"id":"resp_01JZ8A","object":"response","created_at":1783987200,"status":"in_progress","error":null,"incomplete_details":null,"instructions":null,"metadata":{},"model":"gpt-5","output":[],"parallel_tool_calls":true,"temperature":1,"tool_choice":"auto","tools":[],"top_p":1,"usage":null}}
        '400':
          $ref: '#/components/responses/GatewayBadRequest'
        '401':
          $ref: '#/components/responses/GatewayUnauthorized'
        '403':
          $ref: '#/components/responses/GatewayForbidden'
        '404':
          $ref: '#/components/responses/GatewayNotFound'
        '413':
          $ref: '#/components/responses/GatewayPayloadTooLarge'
        '415':
          $ref: '#/components/responses/GatewayUnsupportedMediaType'
        '422':
          $ref: '#/components/responses/GatewayUnprocessableEntity'
        '429':
          $ref: '#/components/responses/GatewayTooManyRequests'
        '500':
          $ref: '#/components/responses/GatewayInternalError'
        '502':
          $ref: '#/components/responses/GatewayBadGateway'
        '503':
          $ref: '#/components/responses/GatewayServiceUnavailable'
        '504':
          $ref: '#/components/responses/GatewayUpstreamTimeout'

  /v1/chat/completions:
    post:
      tags: [Gateway]
      operationId: createChatCompletion
      summary: 创建 Chat Completions 请求
      description: |
        Release 1 冻结文本消息、文本输出、函数工具、流式与非流式行为。`stream=true`
        时发送 OpenAI chunk SSE，每帧为 `data: <ChatCompletionChunk>`，正常结束发送
        `data: [DONE]`。流开始后错误是 PoolAI R1 兼容策略：发送
        `data: {"error":{"message":...,"type":...,"param":null,"code":...}}` 后关闭连接，
        且不发送 `[DONE]`；这不是 Responses typed event。默认 `include_usage=false` 的文本流见
        `fixtures/chat-completions-text-no-usage.sse`；显式 `include_usage=true` 的文本流与函数调用流分别见
        `fixtures/chat-completions-text.sse`、`fixtures/chat-completions-function-call.sse`，
        usage 超界终止流见 `fixtures/chat-completions-usage-out-of-range.sse`，
        tool 结果回传请求见 `fixtures/chat-completions-tool-followup.json`。
      security:
        - PoolApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: 非流式 ChatCompletion 或 chunk SSE
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletion'
            text/event-stream:
              schema:
                type: string
                contentMediaType: text/event-stream
              description: 每个非 `[DONE]` 的 `data` JSON 必须匹配 `ChatCompletionChunk` 或 `ChatCompletionErrorEvent`；无 usage、含 usage、函数调用与错误 fixture 分别位于 fixtures/chat-completions-text-no-usage.sse、fixtures/chat-completions-text.sse、fixtures/chat-completions-function-call.sse、fixtures/chat-completions-error.sse 和 fixtures/chat-completions-usage-out-of-range.sse
        '400':
          $ref: '#/components/responses/GatewayBadRequest'
        '401':
          $ref: '#/components/responses/GatewayUnauthorized'
        '403':
          $ref: '#/components/responses/GatewayForbidden'
        '404':
          $ref: '#/components/responses/GatewayNotFound'
        '413':
          $ref: '#/components/responses/GatewayPayloadTooLarge'
        '415':
          $ref: '#/components/responses/GatewayUnsupportedMediaType'
        '422':
          $ref: '#/components/responses/GatewayUnprocessableEntity'
        '429':
          $ref: '#/components/responses/GatewayTooManyRequests'
        '500':
          $ref: '#/components/responses/GatewayInternalError'
        '502':
          $ref: '#/components/responses/GatewayBadGateway'
        '503':
          $ref: '#/components/responses/GatewayServiceUnavailable'
        '504':
          $ref: '#/components/responses/GatewayUpstreamTimeout'

  /v1/models:
    get:
      tags: [Gateway]
      operationId: listModels
      summary: 列出当前 Key 可访问的模型
      description: 模型清单由 API Key 固定绑定的 Group 和启用 Channel 决定。该查询使用 NonStream bulkhead，但不计入 Group RPM、不做 Group Token reservation；其 429 只能是 `gateway_overloaded`。
      security:
        - PoolApiKey: []
      responses:
        '200':
          description: 模型列表
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
        '401':
          $ref: '#/components/responses/GatewayUnauthorized'
        '403':
          $ref: '#/components/responses/GatewayForbidden'
        '429':
          $ref: '#/components/responses/GatewayQueryOverloaded'
        '500':
          $ref: '#/components/responses/GatewayInternalError'
        '503':
          $ref: '#/components/responses/GatewayServiceUnavailable'

  /v1/usage:
    get:
      tags: [Usage]
      operationId: getPoolUsage
      summary: 查询 Key 所属 Group 的共享池总体用量
      description: |
        Group 由服务端根据 API Key 确定，客户端不能指定 Group。返回整个 Group 的
        quota 和聚合 usage，不返回 Account、其他用户或其他 API Key 明细。配额耗尽时
        本接口仍返回 200；只有访问资格无效时才拒绝。`quota` 来自 PostgreSQL 权威状态，
        usage 时间窗口允许异步聚合延迟。该查询不计入 Group RPM，其 429 只能是独立 Usage bulkhead 的 `gateway_overloaded`。
      security:
        - PoolApiKey: []
      responses:
        '200':
          description: Group 池总体配额与用量
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolUsage'
        '401':
          $ref: '#/components/responses/GatewayUnauthorized'
        '403':
          $ref: '#/components/responses/GatewayForbidden'
        '429':
          $ref: '#/components/responses/GatewayQueryOverloaded'
        '500':
          $ref: '#/components/responses/GatewayInternalError'
        '503':
          $ref: '#/components/responses/GatewayServiceUnavailable'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 用户登录
      description: 封闭注册；不存在自助注册端点。登录失败不泄露邮箱是否存在。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: 登录成功
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              schema:
                type: string
                const: no-store
              description: 固定为 `no-store`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      summary: 单次轮换 Refresh Token
      description: Refresh Token 只能成功使用一次；重放返回 `refresh_token_reused`。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: 轮换后的新 Token 对
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              schema:
                type: string
                const: no-store
              description: 固定为 `no-store`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 撤销当前会话或全部会话
      x-required-roles: [user, auditor, operator, admin]
      security:
        - UserJwt: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '204':
          description: 已撤销；重复调用也返回 204
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/auth/totp/verify:
    post:
      tags: [Auth]
      operationId: verifyLoginTotp
      summary: 使用一次性 MFA challenge 完成登录
      description: challenge 有效期 5 分钟且只能成功使用一次；正式 Token 只在校验成功后签发。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpVerifyRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: MFA 校验成功
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              schema:
                type: string
                const: no-store
              description: 固定为 `no-store`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      summary: 请求密码重置邮件
      description: 无论邮箱是否存在都返回相同 202，避免账号枚举。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '202':
          description: 请求已接受；不表示邮箱存在或邮件已送达
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: 使用单用 Token 重置密码
      description: 成功后递增 TokenVersion、撤销全部 Refresh Token，并消费重置 Token。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '204':
          description: 密码已重置
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/me:
    get:
      tags: [Me]
      operationId: getMyProfile
      summary: 读取当前用户与安全状态
      description: 前端不解码 JWT 作为资料真相；TOTP 只返回是否已启用，不返回 secret 或恢复码。
      x-required-roles: [user, auditor, operator, admin]
      security:
        - UserJwt: []
      responses:
        '200':
          description: 当前用户资料与安全摘要
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              schema:
                type: string
                const: no-store
              description: 固定为 `no-store`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/me/password:
    post:
      tags: [Me]
      operationId: changeMyPassword
      summary: 验证当前密码后修改密码
      description: 成功后递增 TokenVersion、撤销所有 Refresh Token，并强制重新登录。
      x-required-roles: [user, auditor, operator, admin]
      security:
        - UserJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '204':
          description: 密码已修改，当前及其他会话均已撤销
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            ETag:
              $ref: '#/components/headers/ETag'
            Cache-Control:
              schema:
                type: string
                const: no-store
              description: 固定为 `no-store`
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/me/totp/setup:
    post:
      tags: [Me]
      operationId: beginMyTotpSetup
      summary: 创建待确认 TOTP 设置
      x-required-roles: [user, auditor, operator, admin]
      description: 返回的 secret/challenge 只用于本次设置，10 分钟后过期；尚不启用 TOTP。
      security:
        - UserJwt: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpSetupRequest'
      responses:
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: 待确认设置
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
