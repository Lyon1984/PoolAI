                detail: Group 共享 Token 总量已耗尽。
                instance: /v1/responses
                code: group_quota_exhausted
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: false
                error:
                  message: Group 共享 Token 总量已耗尽。
                  type: rate_limit_error
                  param: null
                  code: group_quota_exhausted
    GatewayQueryOverloaded:
      description: >-
        `/v1/models` 所属 NonStream bulkhead 或 `/v1/usage` 所属 Usage bulkhead 饱和。只允许
        `gateway_overloaded` + `Retry-After: 1`；Group quota exhausted/reserved/insufficient
        以及 Group RPM 不得阻断这两个查询端点。
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
