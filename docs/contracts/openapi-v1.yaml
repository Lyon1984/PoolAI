  /api/v1/admin/channels/{channelId}:
    get:
      tags: [AdminChannels]
      operationId: adminGetChannel
      summary: 查询 Channel
      x-required-roles: [admin, operator, auditor]
      security:
        - UserJwt: []
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel 详情
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      tags: [AdminChannels]
      operationId: adminUpdateChannel
      summary: 更新 Channel 模型映射
      x-required-roles: [admin, operator]
      security:
        - UserJwt: []
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ChannelUpdateRequest'
      responses:
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: 更新后的 Channel
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      tags: [AdminChannels]
      operationId: adminRetireChannel
      summary: 软退役 Channel
      description: |
        仅将状态转为 terminal `retired`，不物理删除模型映射或历史引用。
        若仍被任一 non-null Supply Configuration 引用则返回 `channel_in_use`。
      x-required-roles: [admin, operator]
      security:
        - UserJwt: []
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/XChangeReason'
      responses:
        '204':
          description: 已软退役；历史依赖保留
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            ETag:
              $ref: '#/components/headers/ETag'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

components:
  securitySchemes:
    PoolApiKey:
      type: http
      scheme: bearer
      bearerFormat: sk-…
      description: |
        数据面专用 API Key，放在 `Authorization: Bearer sk-...`。服务端只保存
        HMAC-SHA256 hash 与可展示 prefix。不能放在 URL、cookie 或 query string。
    UserJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        控制面短期 Access JWT，放在 `Authorization: Bearer <jwt>`。管理员权限由
        token claim 与数据库当前角色共同校验，不能用 `sk-` Key 替代。

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: 服务端返回的不透明游标
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        业务资源变更幂等键。ASCII 1..128 字符；作用域为 principal + method + path，
        至少保留 24 小时。相同键不同请求摘要返回 `idempotency_conflict`。
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[\x21-\x7E]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: GET 返回的强 ETag，例如 `"v7"`；不接受 `*` 或弱 ETag。
      schema:
        type: string
        pattern: '^"v[1-9][0-9]*"$'
    XChangeReason:
      name: X-Change-Reason
      in: header
      required: true
      description: 撤销、软退役等无 request body 高风险变更的强制审计原因；UTF-8 文本 1..500 字符。
      schema:
        type: string
        minLength: 1
        maxLength: 500
        pattern: '.*\S.*'
    UserId:
      name: userId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    SubscriptionId:
      name: subscriptionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    ChannelId:
      name: channelId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'

  headers:
    XRequestId:
      description: 服务端为本次入站请求生成的 UUIDv7 标识；日志、trace、错误 body 与 Header 保持一致。幂等重放也使用本次请求的新标识，不复用首次请求的关联 ID。
      schema:
        $ref: '#/components/schemas/Uuid'
    Location:
      description: 新资源的绝对或同源相对 URI
      schema:
        type: string
    ETag:
      description: 由资源正整数 version 生成的强 ETag，例如 `"v7"`
      schema:
        type: string
        pattern: '^"v[1-9][0-9]*"$'
    RetryAfter:
      description: 可重试前至少等待的秒数；`group_quota_reserved` 和 `gateway_overloaded` 固定为 1，二者 HTTP 状态均为 429
      schema:
        type: integer
        minimum: 1

  responses:
    GatewayBadRequest:
      description: 网关请求语法、字段或业务参数无效
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayUnauthorized:
      description: 缺少、无效、已禁用、已过期或已撤销的 API Key
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayForbidden:
      description: API Key 有效，但订阅、Group 或模型授权不足
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayNotFound:
      description: 当前 Group 不可见的模型或资源
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayPayloadTooLarge:
      description: 模型请求体超过入口或应用上限
      x-http-status: 413
      x-error-code: payload_too_large
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayUnsupportedMediaType:
      description: 模型请求 Content-Type 不受支持
      x-http-status: 415
      x-error-code: unsupported_media_type
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayUnprocessableEntity:
      description: JSON 语法有效，但模型请求字段或约束失败
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
    GatewayInternalError:
      description: 网关内部错误或 Token 精确整数溢出；不暴露堆栈、SQL、原始溢出值或秘密
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
          examples:
            tokenNumericOverflow:
              summary: Token 精确整数超出数据库可表示范围；不暴露原始数值
              value:
                type: https://poolai.example/problems/token-numeric-overflow
                title: Token numeric overflow
                status: 500
                detail: Token 精确整数超出服务端可表示范围，请联系管理员并提供 request_id。
                instance: /v1/responses
                code: token_numeric_overflow
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: false
                error:
                  message: Token 精确整数超出服务端可表示范围，请联系管理员并提供 request_id。
                  type: server_error
                  param: null
                  code: token_numeric_overflow
    GatewayBadGateway:
      description: 上游认证、协议或响应失败
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
          examples:
            dispatchAmbiguous:
              summary: 已 dispatch 但无法证明上游未执行；不透明重放
              value:
                type: https://poolai.example/problems/upstream-dispatch-ambiguous
                title: Upstream dispatch result is ambiguous
                status: 502
                detail: 请求已发往上游，但无法安全确认执行结果。
                instance: /v1/responses
                code: upstream_dispatch_ambiguous
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: false
                error:
                  message: 请求已发往上游，但无法安全确认执行结果。
                  type: server_error
                  param: null
                  code: upstream_dispatch_ambiguous
            usageOutOfRange:
              summary: 上游单请求 usage 超出兼容协议安全整数范围；不截断、不浮点化
              value:
                type: https://poolai.example/problems/upstream-usage-out-of-range
                title: Upstream usage out of range
                status: 502
                detail: 上游返回的单请求 usage 超出兼容协议的安全整数范围。
                instance: /v1/responses
                code: upstream_usage_out_of_range
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: false
                error:
                  message: 上游返回的单请求 usage 超出兼容协议的安全整数范围。
                  type: server_error
                  param: null
                  code: upstream_usage_out_of_range
    GatewayServiceUnavailable:
      description: 配额真相库、硬协调或依赖服务暂不可用
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
          examples:
            dependencyUnavailable:
              summary: "PostgreSQL 或其他必需依赖暂不可用；响应 Header 必须 Retry-After: 1"
              value:
                type: https://poolai.example/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: 必需依赖暂不可用，请稍后重试。
                instance: /v1/responses
                code: dependency_unavailable
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: true
                retry_after_seconds: 1
                error:
                  message: 必需依赖暂不可用，请稍后重试。
                  type: server_error
                  param: null
                  code: dependency_unavailable
    GatewayUpstreamTimeout:
      description: 上游建连或首包阶段超时；流已开始后的 idle timeout 使用 SSE 终止 error event，不伪造 504
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
          examples:
            connectTimeout:
              summary: transport 证明未写出上游请求字节，可安全 failover；旧 attempt 以 confirmed_no_execution=0 settle
              value:
                type: https://poolai.example/problems/upstream-connect-timeout
                title: Upstream connect timeout
                status: 504
                detail: 在限定时间内未能建立上游连接。
                instance: /v1/responses
                code: upstream_connect_timeout
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: true
                error:
                  message: 在限定时间内未能建立上游连接。
                  type: server_error
                  param: null
                  code: upstream_connect_timeout
            firstByteTimeout:
              summary: 已 dispatch，执行结果有歧义，不透明重放
              value:
                type: https://poolai.example/problems/upstream-first-byte-timeout
                title: Upstream first byte timeout
                status: 504
                detail: 请求已发送，但在限定时间内未收到可验证的上游响应。
                instance: /v1/responses
                code: upstream_first_byte_timeout
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: false
                error:
                  message: 请求已发送，但在限定时间内未收到可验证的上游响应。
                  type: server_error
                  param: null
                  code: upstream_first_byte_timeout

    BadRequest:
      description: 请求语法、字段或业务参数无效
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    Unauthorized:
      description: 缺少、无效或过期的凭据
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    Forbidden:
      description: 凭据有效，但角色、订阅、Group 或模型授权不足
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    NotFound:
      description: 资源或模型不存在，或调用者不可见
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    Conflict:
      description: 唯一性、引用、状态或幂等冲突
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
          examples:
            groupActivationNotReady:
              summary: Group 激活时配额或供给前置条件不满足
              value:
