      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GatewayProblem'
          examples:
            gatewayOverloaded:
              summary: "NonStream/SSE 当前路径所属的独立 bulkhead 已满；必须同时返回 Retry-After: 1"
              value:
                type: https://poolai.example/problems/gateway-overloaded
                title: Gateway overloaded
                status: 429
                detail: 当前请求所属的有界并发分区已满，请稍后重试。
                instance: /v1/responses
                code: gateway_overloaded
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
