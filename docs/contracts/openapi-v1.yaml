         fact_consumed_tokens, pending_reservation_tokens, consumed_variance, reserved_variance,
         is_reconciled, checked_at, data_watermark]
      properties:
        group_id:
          $ref: '#/components/schemas/Uuid'
        period_id:
          $ref: '#/components/schemas/Uuid'
        ledger_total_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        ledger_consumed_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        ledger_reserved_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        fact_consumed_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        pending_reservation_tokens:
          $ref: '#/components/schemas/AggregateTokenCount'
        consumed_variance:
          $ref: '#/components/schemas/SignedAggregateTokenCount'
          description: ledger_consumed_tokens - fact_consumed_tokens
        reserved_variance:
          $ref: '#/components/schemas/SignedAggregateTokenCount'
          description: ledger_reserved_tokens - pending_reservation_tokens
        is_reconciled:
          type: boolean
          description: consumed_variance 与 reserved_variance 都为字符串 `0` 时为 true，表示本次配额账本核对一致
