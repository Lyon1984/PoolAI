              value:
                type: https://poolai.example/problems/gateway-overloaded
                title: Gateway overloaded
                status: 429
                detail: 当前查询所属的有界并发分区已满，请稍后重试。
                instance: /v1/usage
                code: gateway_overloaded
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: true
                retry_after_seconds: 1
                error:
                  message: 当前查询所属的有界并发分区已满，请稍后重试。
                  type: rate_limit_error
                  param: null
                  code: gateway_overloaded
    PreconditionRequired:
      description: 缺少 Idempotency-Key 或必需的 If-Match
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    InternalError:
      description: 内部错误或 Token 精确整数溢出；不暴露堆栈、SQL、原始溢出值或秘密
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    BadGateway:
      description: 上游认证、协议或响应失败
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
    ServiceUnavailable:
      description: 配额真相库、硬协调或依赖服务暂不可用
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ControlPlaneProblem'
          examples:
            dependencyUnavailable:
              summary: "PostgreSQL 或其他必需依赖暂不可用；响应 Header 必须 Retry-After: 1"
              value:
                type: https://poolai.example/problems/dependency-unavailable
                title: Dependency unavailable
                status: 503
                detail: 必需依赖暂不可用，请稍后重试。
                instance: /api/v1/admin/groups
                code: dependency_unavailable
                request_id: 0190f8bf-a040-7444-a2ca-c4bc32e48b47
                retryable: true
                retry_after_seconds: 1
  schemas:
    Uuid:
      type: string
      format: uuid
      description: 服务端生成 UUIDv7；客户端只需按 UUID 不透明处理
    SafeTokenCount:
      type: integer
      format: int64
      minimum: 0
      maximum: 9007199254740991
      description: 非负 Token 数；JSON 不得超过 2^53-1
    PositiveSafeTokenCount:
      type: integer
      format: int64
      minimum: 1
      maximum: 9007199254740991
      description: 大于零且不超过 2^53-1 的 Token 数
    AggregateTokenCount:
      type: string
      pattern: '^(0|[1-9][0-9]*)$'
      maxLength: 78
      description: 累计 Token 的规范十进制字符串；无符号、无前导零（0 除外）
      example: '10000000000'
    SignedAggregateTokenCount:
      type: string
      pattern: '^(0|-?[1-9][0-9]*)$'
      maxLength: 79
      description: 仅用于 ledger delta/对账差异的规范有符号十进制字符串
      example: '-20'
    ResourceVersion:
      type: integer
      format: int64
      minimum: 1
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC 时间；响应统一使用 Z
    MailboxInput:
      type: string
      maxLength: 254
      pattern: "^[A-Za-z0-9!#$%&'*+/=?^_`{|}~-]+(?:\\.[A-Za-z0-9!#$%&'*+/=?^_`{|}~-]+)*@[^@\\s]+$"
      description: >-
        Identity 邮箱输入。local-part 必须是最长 64 字符的 ASCII dot-atom，不接受 quoted local-part、
        comment 或 domain literal；domain 使用 IDNA/STD3 转为小写 ASCII DNS 名，规范化后的完整 mailbox
        最长 254 字符。服务端以规范化值做身份比较。
    ControlPlaneProblem:
      type: object
      additionalProperties: false
      description: 仅用于 `/api/v1/*` 控制面 `application/problem+json`；该封闭 Schema 不允许顶层 OpenAI `error` 投影
      required: [type, title, status, detail, instance, code, request_id, retryable]
      properties:
        type:
          type: string
          format: uri
          description: 稳定问题类型 URI；不要求可在线访问
        title:
          type: string
          description: 稳定英文短标题，不用于程序判断
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          description: 面向当前请求的安全描述；不得包含秘密或内部堆栈
        instance:
          type: string
          description: 当前请求路径
        code:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: 客户端唯一可依赖的稳定业务错误码
        request_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: 本次入站请求的关联标识；幂等重放重新生成，并与 X-Request-Id、日志和 trace 一致。
        retryable:
          type: boolean
        retry_after_seconds:
          type: integer
          minimum: 1
          description: 仅当服务端能给出等待时间时出现，并与 Retry-After Header 一致
        errors:
          type: object
          description: 字段级校验错误；key 为 JSON Pointer，value 为安全消息数组
          additionalProperties:
            type: array
            items:
              type: string
    OpenAIErrorProjection:
      type: object
      additionalProperties: false
      required: [message, type, param, code]
      properties:
        message:
          type: string
        type:
          type: string
        param:
          type: [string, 'null']
        code:
          type: [string, 'null']
          description: 非 null 时必须与外层 code 完全相同
    GatewayProblem:
      type: object
      additionalProperties: false
      description: 仅用于 `/v1/*` 数据面 `application/json`；必须带 OpenAI/Codex SDK 可识别的顶层 error 投影
      required: [type, title, status, detail, instance, code, request_id, retryable, error]
      properties:
        type:
          type: string
          format: uri
          description: 稳定问题类型 URI；不要求可在线访问
        title:
          type: string
          description: 稳定英文短标题，不用于程序判断
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          description: 面向当前请求的安全描述；不得包含秘密或内部堆栈
        instance:
          type: string
          description: 当前请求路径
        code:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: 客户端唯一可依赖的稳定业务错误码
        request_id:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: 本次入站请求的关联标识；幂等重放重新生成，并与 X-Request-Id、日志和 trace 一致。
        retryable:
          type: boolean
        retry_after_seconds:
          type: integer
          minimum: 1
          description: 仅当服务端能给出等待时间时出现，并与 Retry-After Header 一致
        errors:
          type: object
          description: 字段级校验错误；key 为 JSON Pointer，value 为安全消息数组
          additionalProperties:
            type: array
            items:
              type: string
        error:
          $ref: '#/components/schemas/OpenAIErrorProjection'
          description: "`error.code` 非 null 时必须与外层 `code` 相同；`error.message` 必须等于安全 `detail`"
    GatewayOverloadedProblem:
      allOf:
        - $ref: '#/components/schemas/GatewayProblem'
        - type: object
          required: [status, code, retryable, retry_after_seconds, error]
          properties:
            status:
              type: integer
              const: 429
            code:
              type: string
              const: gateway_overloaded
            retryable:
              type: boolean
              const: true
            retry_after_seconds:
              type: integer
              const: 1
            error:
              allOf:
                - $ref: '#/components/schemas/OpenAIErrorProjection'
                - type: object
                  required: [code]
                  properties:
                    code:
                      type: string
                      const: gateway_overloaded
    ResponseStreamEvent:
      description: Responses typed SSE 每个 `data` JSON 的封闭联合；wire `event` 必须等于 `type`。
      oneOf:
        - $ref: '#/components/schemas/ResponseCreatedEvent'
        - $ref: '#/components/schemas/ResponseInProgressEvent'
        - $ref: '#/components/schemas/ResponseOutputItemAddedEvent'
        - $ref: '#/components/schemas/ResponseContentPartAddedEvent'
        - $ref: '#/components/schemas/ResponseOutputTextDeltaEvent'
        - $ref: '#/components/schemas/ResponseOutputTextDoneEvent'
        - $ref: '#/components/schemas/ResponseContentPartDoneEvent'
        - $ref: '#/components/schemas/ResponseFunctionCallArgumentsDeltaEvent'
        - $ref: '#/components/schemas/ResponseFunctionCallArgumentsDoneEvent'
        - $ref: '#/components/schemas/ResponseOutputItemDoneEvent'
        - $ref: '#/components/schemas/ResponseCompletedEvent'
        - $ref: '#/components/schemas/PoolResponseErrorEvent'
      discriminator:
        propertyName: type
        mapping:
          response.created: '#/components/schemas/ResponseCreatedEvent'
          response.in_progress: '#/components/schemas/ResponseInProgressEvent'
          response.output_item.added: '#/components/schemas/ResponseOutputItemAddedEvent'
          response.content_part.added: '#/components/schemas/ResponseContentPartAddedEvent'
          response.output_text.delta: '#/components/schemas/ResponseOutputTextDeltaEvent'
          response.output_text.done: '#/components/schemas/ResponseOutputTextDoneEvent'
          response.content_part.done: '#/components/schemas/ResponseContentPartDoneEvent'
          response.function_call_arguments.delta: '#/components/schemas/ResponseFunctionCallArgumentsDeltaEvent'
          response.function_call_arguments.done: '#/components/schemas/ResponseFunctionCallArgumentsDoneEvent'
          response.output_item.done: '#/components/schemas/ResponseOutputItemDoneEvent'
          response.completed: '#/components/schemas/ResponseCompletedEvent'
          error: '#/components/schemas/PoolResponseErrorEvent'
    ResponseInProgressOutputItem:
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/ResponseOutputMessage'
            - type: object
              properties:
                status: { type: string, const: in_progress }
        - allOf:
            - $ref: '#/components/schemas/ResponseOutputFunctionCall'
            - type: object
              properties:
                status: { type: string, const: in_progress }
    ResponseCompletedOutputItem:
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/ResponseOutputMessage'
            - type: object
              properties:
                status: { type: string, const: completed }
        - allOf:
            - $ref: '#/components/schemas/ResponseOutputFunctionCall'
            - type: object
              properties:
                status: { type: string, const: completed }
    ResponseCreatedEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, response]
      properties:
        type: { type: string, const: response.created }
        sequence_number: { type: integer, minimum: 0 }
        response:
          allOf:
            - $ref: '#/components/schemas/OpenAIResponse'
            - type: object
              required: [status, usage]
              properties:
                status: { type: string, const: in_progress }
                usage: { type: 'null' }
    ResponseInProgressEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, response]
      properties:
        type: { type: string, const: response.in_progress }
        sequence_number: { type: integer, minimum: 0 }
        response:
          allOf:
            - $ref: '#/components/schemas/OpenAIResponse'
            - type: object
              required: [status, usage]
              properties:
                status: { type: string, const: in_progress }
                usage: { type: 'null' }
    ResponseOutputItemAddedEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, output_index, item]
      properties:
        type: { type: string, const: response.output_item.added }
        sequence_number: { type: integer, minimum: 0 }
        output_index: { type: integer, minimum: 0 }
        item:
          $ref: '#/components/schemas/ResponseInProgressOutputItem'
    ResponseContentPartAddedEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, content_index, part]
      properties:
        type: { type: string, const: response.content_part.added }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        content_index: { type: integer, minimum: 0 }
        part:
          $ref: '#/components/schemas/ResponseOutputTextPart'
    ResponseOutputTextDeltaEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, content_index, delta, logprobs]
      properties:
        type: { type: string, const: response.output_text.delta }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        content_index: { type: integer, minimum: 0 }
        delta: { type: string }
        logprobs:
          type: array
          items:
            type: object
            additionalProperties: true
    ResponseOutputTextDoneEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, content_index, text, logprobs]
      properties:
        type: { type: string, const: response.output_text.done }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        content_index: { type: integer, minimum: 0 }
        text: { type: string }
        logprobs:
          type: array
          items:
            type: object
            additionalProperties: true
    ResponseContentPartDoneEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, content_index, part]
      properties:
        type: { type: string, const: response.content_part.done }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        content_index: { type: integer, minimum: 0 }
        part:
          $ref: '#/components/schemas/ResponseOutputTextPart'
    ResponseFunctionCallArgumentsDeltaEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, delta]
      properties:
        type: { type: string, const: response.function_call_arguments.delta }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        delta: { type: string }
    ResponseFunctionCallArgumentsDoneEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, item_id, output_index, name, arguments]
      properties:
        type: { type: string, const: response.function_call_arguments.done }
        sequence_number: { type: integer, minimum: 0 }
        item_id: { type: string, minLength: 1 }
        output_index: { type: integer, minimum: 0 }
        name: { type: string, minLength: 1, maxLength: 64 }
        arguments:
          type: string
          description: JSON 对象序列化后的完整字符串
    ResponseOutputItemDoneEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, output_index, item]
      properties:
        type: { type: string, const: response.output_item.done }
        sequence_number: { type: integer, minimum: 0 }
        output_index: { type: integer, minimum: 0 }
        item:
          $ref: '#/components/schemas/ResponseCompletedOutputItem'
    ResponseCompletedEvent:
      type: object
      additionalProperties: false
      required: [type, sequence_number, response]
      properties:
        type: { type: string, const: response.completed }
        sequence_number: { type: integer, minimum: 0 }
        response:
          allOf:
            - $ref: '#/components/schemas/OpenAIResponse'
            - type: object
              required: [status, usage]
              properties:
                status: { type: string, const: completed }
                usage: { $ref: '#/components/schemas/OpenAIUsage' }
    ResponseErrorEvent:
      type: object
      additionalProperties: false
      required: [type, code, message, param, sequence_number]
      properties:
        type:
          type: string
          const: error
        code:
          type: [string, 'null']
          description: 使用 error-catalog.md 的稳定 code；流 Header 已提交后的 error 是终止信号，不表示可自动重放
        message:
          type: string
          description: 安全错误消息
        param:
          type: [string, 'null']
          description: 相关请求字段；无则为 null
        sequence_number:
          type: integer
          minimum: 0
    PoolResponseErrorEvent:
      description: PoolAI R1 允许在 Responses SSE Header 提交后发送的严格终止错误；保留通用 ResponseErrorEvent 兼容面。
      allOf:
        - $ref: '#/components/schemas/ResponseErrorEvent'
        - type: object
          properties:
            code:
              type: string
              enum:
                - upstream_usage_out_of_range
                - upstream_stream_error
                - upstream_first_byte_timeout
                - upstream_stream_idle_timeout
            message:
              type: string
              minLength: 1

    ResponseCreateRequest:
      type: object
      required: [model, input]
      additionalProperties: true
      properties:
        model:
          type: string
          minLength: 1
          maxLength: 200
        input:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                oneOf:
                  - $ref: '#/components/schemas/ResponseInputMessage'
                  - $ref: '#/components/schemas/ResponseFunctionCall'
                  - $ref: '#/components/schemas/ResponseFunctionCallOutput'
          description: Release 1 支持文本消息、函数调用历史与 function_call_output；图像、音频、文件输入不在冻结范围
        instructions:
          type: [string, 'null']
        previous_response_id:
          type: [string, 'null']
        stream:
          type: boolean
          default: false
        max_output_tokens:
          $ref: '#/components/schemas/PositiveSafeTokenCount'
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        tools:
          type: array
          items:
            $ref: '#/components/schemas/FunctionTool'
        tool_choice:
          description: "`none`、`auto`、`required` 或函数选择对象"
          oneOf:
            - type: string
              enum: [none, auto, required]
            - type: object
              additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string
        include:
          type: array
          items:
            type: string
    ResponseInputMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        type:
          type: string
          const: message
          default: message
        role:
          type: string
          enum: [system, developer, user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/ResponseInputTextPart'
    ResponseInputTextPart:
      type: object
      additionalProperties: false
      required: [type, text]
      properties:
        type:
          type: string
          const: input_text
        text:
          type: string
    ResponseOutputTextPart:
      type: object
      additionalProperties: true
      required: [type, text, annotations, logprobs]
      properties:
        type:
          type: string
          const: output_text
        text:
          type: string
        annotations:
          type: array
          items:
            type: object
            additionalProperties: true
        logprobs:
          type: array
          items:
            type: object
            additionalProperties: true
    ResponseOutputMessage:
      type: object
      additionalProperties: true
      required: [id, type, status, role, content]
      properties:
        id:
          type: string
        type:
          type: string
          const: message
        status:
          type: string
          enum: [in_progress, completed, incomplete]
        role:
          type: string
          const: assistant
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputTextPart'
    ResponseFunctionCall:
      type: object
      additionalProperties: true
      required: [type, call_id, name, arguments]
      properties:
        id:
          type: string
        type:
          type: string
          const: function_call
        call_id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 64
        arguments:
          type: string
          description: JSON 对象序列化后的字符串；网关不执行函数
        status:
          type: string
          enum: [in_progress, completed, incomplete]
    ResponseFunctionCallOutput:
      type: object
      additionalProperties: false
      required: [type, call_id, output]
      properties:
        type:
          type: string
          const: function_call_output
        call_id:
          type: string
        output:
          type: string
          description: 客户端执行同一 call_id 对应函数后的结果文本
    ResponseOutputFunctionCall:
      type: object
      additionalProperties: false
      required: [id, type, status, arguments, call_id, name]
      properties:
        id:
          type: string
          minLength: 1
        type:
          type: string
          const: function_call
        status:
          type: string
          enum: [in_progress, completed, incomplete]
        arguments:
          type: string
          description: JSON 对象序列化后的字符串；网关不执行函数
        call_id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
          maxLength: 64
    FunctionTool:
      type: object
      additionalProperties: false
      required: [type, name, parameters]
      properties:
        type:
          type: string
          const: function
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
        parameters:
          type: object
          description: JSON Schema object
          additionalProperties: true
        strict:
          type: boolean
          default: false
    OpenAIResponse:
      type: object
      required:
        [id, object, created_at, status, error, incomplete_details, instructions, metadata,
         model, output, parallel_tool_calls, temperature, tool_choice, tools, top_p]
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
          const: response
        created_at:
          type: integer
          format: int64
          description: Unix seconds
        status:
          type: string
          enum: [in_progress, completed, failed, cancelled, incomplete]
        model:
          type: string
        output:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/ResponseOutputMessage'
              - $ref: '#/components/schemas/ResponseFunctionCall'
        incomplete_details:
          type: [object, 'null']
          additionalProperties: true
        instructions:
          type: [string, 'null']
        metadata:
          type: [object, 'null']
          additionalProperties:
            type: string
        parallel_tool_calls:
          type: boolean
        temperature:
          type: [number, 'null']
          minimum: 0
          maximum: 2
        tool_choice:
          oneOf:
            - type: string
              enum: [none, auto, required]
            - type: object
              additionalProperties: true
        tools:
          type: array
          items:
            $ref: '#/components/schemas/FunctionTool'
        top_p:
          type: [number, 'null']
          minimum: 0
          maximum: 1
        usage:
          oneOf:
            - $ref: '#/components/schemas/OpenAIUsage'
            - type: 'null'
        error:
          oneOf:
            - $ref: '#/components/schemas/OpenAIResponseError'
            - type: 'null'
    OpenAIResponseError:
      type: object
      required: [code, message]
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
    OpenAIUsage:
      type: object
      required: [input_tokens, input_tokens_details, output_tokens, output_tokens_details, total_tokens]
      additionalProperties: true
      properties:
        input_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        output_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        total_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        input_tokens_details:
          type: object
          additionalProperties: true
          required: [cache_write_tokens, cached_tokens]
          properties:
            cache_write_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
              description: 上游明确返回时原值透传；缺失时由 PoolAI 规范化为 0，使 R1 响应契约保持稳定。
            cached_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
        output_tokens_details:
          type: object
          additionalProperties: true
          required: [reasoning_tokens]
          properties:
            reasoning_tokens:
              $ref: '#/components/schemas/SafeTokenCount'

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      additionalProperties: true
      properties:
        model:
          type: string
          minLength: 1
          maxLength: 200
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatMessage'
        stream:
          type: boolean
          default: false
        max_completion_tokens:
          $ref: '#/components/schemas/PositiveSafeTokenCount'
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ChatFunctionTool'
        tool_choice:
          description: OpenAI Chat tool_choice 子集
          oneOf:
            - type: string
              enum: [none, auto, required]
            - type: object
              additionalProperties: false
              required: [type, function]
              properties:
                type:
                  type: string
                  const: function
                function:
                  type: object
                  additionalProperties: false
                  required: [name]
                  properties:
                    name:
                      type: string
        stream_options:
          type: object
          additionalProperties: false
          properties:
            include_usage:
              type: boolean
              default: false
              description: false 时不发送独立 usage chunk，正常 chunk 的 usage 可省略或为 null；true 时在 [DONE] 前追加 choices=[] 的独立 usage chunk，且此前每个正常 chunk 必须显式为 usage=null
            include_obfuscation:
              type: boolean
              default: true
    ChatMessage:
      oneOf:
        - $ref: '#/components/schemas/ChatSystemMessage'
        - $ref: '#/components/schemas/ChatDeveloperMessage'
        - $ref: '#/components/schemas/ChatUserMessage'
        - $ref: '#/components/schemas/ChatAssistantMessage'
        - $ref: '#/components/schemas/ChatToolMessage'
      discriminator:
        propertyName: role
    ChatTextPart:
      type: object
      additionalProperties: false
      required: [type, text]
      properties:
        type:
          type: string
          const: text
        text:
          type: string
    ChatSystemMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role: { type: string, const: system }
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items: { $ref: '#/components/schemas/ChatTextPart' }
        name: { type: string }
    ChatDeveloperMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role: { type: string, const: developer }
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items: { $ref: '#/components/schemas/ChatTextPart' }
        name: { type: string }
    ChatUserMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role: { type: string, const: user }
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items: { $ref: '#/components/schemas/ChatTextPart' }
        name: { type: string }
    ChatAssistantMessage:
      type: object
      additionalProperties: false
      required: [role]
      anyOf:
        - required: [content]
          properties:
            content:
              oneOf:
                - type: string
                - type: array
                  minItems: 1
                  items: { $ref: '#/components/schemas/ChatTextPart' }
        - required: [tool_calls]
      properties:
        role: { type: string, const: assistant }
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items: { $ref: '#/components/schemas/ChatTextPart' }
            - type: 'null'
        tool_calls:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ChatToolCall' }
        refusal: { type: [string, 'null'] }
        name: { type: string }
    ChatToolMessage:
      type: object
      additionalProperties: false
      required: [role, tool_call_id, content]
      properties:
        role: { type: string, const: tool }
        tool_call_id: { type: string }
        content:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items: { $ref: '#/components/schemas/ChatTextPart' }
    ChatToolCall:
      type: object
      additionalProperties: false
      required: [id, type, function]
      properties:
        id: { type: string }
        type: { type: string, const: function }
        function:
          type: object
          additionalProperties: false
          required: [name, arguments]
          properties:
            name: { type: string }
            arguments:
              type: string
              description: JSON 对象序列化后的字符串
    ChatFunctionTool:
      type: object
      additionalProperties: false
      required: [type, function]
      properties:
        type: { type: string, const: function }
        function:
          type: object
          additionalProperties: false
          required: [name, parameters]
          properties:
            name: { type: string, minLength: 1, maxLength: 64 }
            description: { type: string }
            parameters:
              type: object
              additionalProperties: true
            strict: { type: boolean, default: false }
    ChatCompletion:
      type: object
      required: [id, object, created, model, choices]
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
          const: chat.completion
        created:
          type: integer
          format: int64
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [index, message, finish_reason]
            properties:
              index: { type: integer, minimum: 0 }
              message: { $ref: '#/components/schemas/ChatAssistantMessage' }
              finish_reason: { type: [string, 'null'] }
        usage:
          $ref: '#/components/schemas/ChatCompletionUsage'
    ChatCompletionUsage:
      type: object
      additionalProperties: true
      required: [prompt_tokens, completion_tokens, total_tokens]
      description: "`total_tokens` 必须等于 `prompt_tokens + completion_tokens`；fixture validator 执行关系校验。"
      properties:
        prompt_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        completion_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        total_tokens:
          $ref: '#/components/schemas/SafeTokenCount'
        prompt_tokens_details:
          type: object
          additionalProperties: true
          properties:
            cached_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
            cache_write_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
              description: 上游明确返回时原值透传；缺失时保持缺失，不伪造为 0。
        completion_tokens_details:
          type: object
          additionalProperties: true
          properties:
            reasoning_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
            accepted_prediction_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
            rejected_prediction_tokens:
              $ref: '#/components/schemas/SafeTokenCount'
    ChatCompletionChunk:
      type: object
      additionalProperties: false
      required: [id, object, created, model, choices]
      description: Chat SSE 的正常 JSON 帧；内容帧 usage 省略或固定 null，独立 usage 帧 choices 固定为空数组。
      oneOf:
        - properties:
            choices:
              type: array
              minItems: 1
            usage:
              type: 'null'
        - required: [usage]
          properties:
            choices:
              type: array
              maxItems: 0
            usage:
              $ref: '#/components/schemas/ChatCompletionUsage'
      properties:
        id:
          type: string
          minLength: 1
        object:
          type: string
          const: chat.completion.chunk
        created:
          type: integer
          format: int64
        model:
          type: string
          minLength: 1
        obfuscation:
          type: string
          minLength: 1
          description: "`stream_options.include_obfuscation=true` 时可返回的流填充字段"
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionChunkChoice'
        usage:
          oneOf:
            - $ref: '#/components/schemas/ChatCompletionUsage'
            - type: 'null'
    ChatCompletionChunkChoice:
      type: object
      additionalProperties: false
      required: [index, delta, finish_reason]
      properties:
        index:
          type: integer
          minimum: 0
        delta:
          $ref: '#/components/schemas/ChatCompletionChunkDelta'
        finish_reason:
          type: [string, 'null']
          enum: [stop, length, tool_calls, content_filter, function_call, null]
    ChatCompletionChunkDelta:
      type: object
      additionalProperties: false
      properties:
        role:
          type: string
          const: assistant
        content:
          type: [string, 'null']
        tool_calls:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatCompletionChunkToolCallDelta'
    ChatCompletionChunkToolCallDelta:
      type: object
      additionalProperties: false
      required: [index]
      properties:
        index:
          type: integer
          minimum: 0
        id:
          type: string
          minLength: 1
        type:
          type: string
          const: function
        function:
          $ref: '#/components/schemas/ChatCompletionChunkFunctionDelta'
    ChatCompletionChunkFunctionDelta:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        arguments:
          type: string
    ChatCompletionErrorEvent:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ChatCompletionStreamError'
    ChatCompletionStreamError:
      type: object
      additionalProperties: false
      required: [message, type, param, code]
      properties:
        message:
          type: string
          minLength: 1
        type:
          type: string
          const: server_error
        param:
          type: 'null'
        code:
          type: string
          enum:
            [upstream_stream_error, upstream_first_byte_timeout,
             upstream_stream_idle_timeout, upstream_usage_out_of_range]
    Model:
      type: object
      required: [id, object, created, owned_by]
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
          const: model
        created:
          type: integer
          format: int64
        owned_by:
          type: string
    ModelList:
      type: object
      required: [object, data]
      additionalProperties: false
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/Model'

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          $ref: '#/components/schemas/MailboxInput'
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 1024
          writeOnly: true
    LoginResult:
      oneOf:
        - $ref: '#/components/schemas/TokenPair'
        - $ref: '#/components/schemas/MfaChallenge'
    MfaChallenge:
      type: object
      additionalProperties: false
      required: [object, challenge_id, expires_in]
      properties:
        object:
          type: string
          const: mfa_required
        challenge_id:
          $ref: '#/components/schemas/Uuid'
          readOnly: true
        expires_in:
          type: integer
          const: 300
    TotpVerifyRequest:
      type: object
      additionalProperties: false
      required: [challenge_id, totp_code]
      properties:
        challenge_id:
          $ref: '#/components/schemas/Uuid'
        totp_code:
          type: string
          pattern: '^[0-9]{6}$'
          writeOnly: true
    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          $ref: '#/components/schemas/MailboxInput'
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, new_password]
      properties:
        token:
          type: string
          minLength: 32
          maxLength: 4096
          writeOnly: true
        new_password:
          type: string
          format: password
          minLength: 12
          maxLength: 1024
          writeOnly: true
    TotpSetupRequest:
      type: object
      additionalProperties: false
      required: [current_password]
      properties:
        current_password:
          type: string
          format: password
          minLength: 1
          maxLength: 1024
          writeOnly: true
    TotpSetupResult:
      type: object
      additionalProperties: false
      required: [challenge_id, secret, otpauth_uri, expires_in]
      properties:
        challenge_id:
          $ref: '#/components/schemas/Uuid'
          readOnly: true
        secret:
          type: string
          readOnly: true
        otpauth_uri:
          type: string
          readOnly: true
        expires_in:
          type: integer
          const: 600
    TotpConfirmRequest:
      type: object
      additionalProperties: false
      required: [challenge_id, totp_code]
      properties:
        challenge_id:
          $ref: '#/components/schemas/Uuid'
        totp_code:
          type: string
          pattern: '^[0-9]{6}$'
          writeOnly: true
    TotpConfirmResult:
      type: object
      additionalProperties: false
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          minItems: 8
          maxItems: 8
          items:
            type: string
          readOnly: true
    TotpDisableRequest:
      type: object
      additionalProperties: false
      required: [current_password, totp_code]
      properties:
        current_password:
          type: string
          format: password
          minLength: 1
          maxLength: 1024
          writeOnly: true
        totp_code:
          type: string
          pattern: '^[0-9]{6}$'
          writeOnly: true
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 32
          maxLength: 4096
          writeOnly: true
    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          minLength: 32
          maxLength: 4096
          writeOnly: true
          description: 省略时撤销当前 Access JWT 对应会话
        all_sessions:
          type: boolean
          default: false
    TokenPair:
      type: object
      additionalProperties: false
      required: [token_type, access_token, expires_in, refresh_token, refresh_expires_in]
      properties:
        token_type:
          type: string
          const: Bearer
        access_token:
          type: string
          readOnly: true
        expires_in:
          type: integer
          const: 900
          description: Access JWT 固定 15 分钟
        refresh_token:
          type: string
          readOnly: true
        refresh_expires_in:
          type: integer
          const: 2592000
          description: Refresh Token 固定 30 天

    PageInfo:
      type: object
      additionalProperties: false
      required: [has_more]
      properties:
        next_cursor:
          type: [string, 'null']
        has_more:
          type: boolean
    SecurityEventSummary:
      type: object
      additionalProperties: false
      description: 当前用户可见的脱敏安全事件投影；不是完整 AuditEvent。
      required:
        [id, event_type, request_id, source, source_ip_summary, user_agent_summary, occurred_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        event_type:
          type: string
          minLength: 1
          maxLength: 200
          description: 登录、会话、密码、TOTP、API Key 或账户安全相关的稳定事件类型
        request_id:
          description: 非 HTTP 后台安全事件可为 null
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        source:
          type: string
          enum: [web, api, gateway, scheduler, worker, system]
        source_ip_summary:
          type: [string, 'null']
          maxLength: 64
          description: 已截断或掩码的网络来源摘要，不返回完整 IP
        user_agent_summary:
          type: [string, 'null']
          maxLength: 200
          description: 已清洗并截断的客户端摘要，不含认证信息
        occurred_at:
          $ref: '#/components/schemas/Timestamp'
    SecurityEventPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SecurityEventSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
    Role:
      type: string
      enum: [admin, operator, auditor, user]
    UserStatus:
      type: string
      enum: [active, disabled]
    CurrentUserProfile:
      type: object
      additionalProperties: false
      required: [id, email, display_name, role, status, totp_enabled, version, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        status:
