                error:
                  message: 当前请求所属的有界并发分区已满，请稍后重试。
                  type: rate_limit_error
                  param: null
                  code: gateway_overloaded
            quotaReserved:
              summary: "仅被并发 reservation 暂时占满；响应 Header 必须 Retry-After: 1"
              value:
                type: https://poolai.example/problems/group-quota-reserved
